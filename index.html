<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<title>Chez Djamil — Gestion d'Atelier v2</title>
<meta name="theme-color" content="#0D9488">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --teal:#0D9488;
  --teal-deep:#0F766E;
  --teal-soft:#CCFBF1;
  --orange:#F97316;
  --orange-soft:#FFEDD5;
  --creme:#F7F5F0;
  --carte:#FFFFFF;
  --encre:#1C2B2A;
  --encre-doux:#5C6B6A;
  --ligne:#E4E1D8;
  --rouge:#DC2626;
  --rouge-soft:#FEE2E2;
  --vert:#16A34A;
  --vert-soft:#DCFCE7;
  --jaune:#FBBF24;
  --bleu:#3B82F6;
  --radius:14px;
  --ombre:0 1px 3px rgba(28,43,42,.08), 0 4px 14px rgba(28,43,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--creme);
  color:var(--encre);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
}
h1,h2,h3,.brand{font-family:'Fraunces',Georgia,serif}
.hidden{display:none !important}

.tape{height:8px;background:repeating-linear-gradient(90deg,var(--teal) 0 2px,transparent 2px 12px),linear-gradient(90deg,var(--orange-soft),var(--teal-soft));border-bottom:1px solid var(--ligne)}

.fullpage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 48px}
.brand{font-size:34px;font-weight:700;color:var(--teal-deep);letter-spacing:-.5px}
.brand small{display:block;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange);margin-top:2px}
.carte{background:var(--carte);border:1px solid var(--ligne);border-radius:var(--radius);box-shadow:var(--ombre);padding:22px 18px;width:100%;max-width:440px}
.fullpage .carte{margin-top:22px}

label{display:block;font-size:13px;font-weight:600;color:var(--encre-doux);margin:12px 0 4px}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--ligne);border-radius:10px;font-size:15px;font-family:inherit;background:#FDFCFA;color:var(--encre)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:14px;text-align:center;text-decoration:none}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:active{background:var(--teal-deep)}
.btn-orange{background:var(--orange);color:#fff}
.btn-ghost{background:transparent;color:var(--teal-deep);border:1.5px solid var(--teal)}
.btn-vert{background:var(--vert);color:#fff}
.btn-jaune{background:var(--jaune);color:#000}
.btn-mini{width:auto;display:inline-block;padding:8px 14px;font-size:13px;margin:6px 6px 0 0}
.btn:disabled{opacity:.5;cursor:not-allowed}

.tabs-auth{display:flex;border:1.5px solid var(--ligne);border-radius:10px;overflow:hidden;margin-bottom:6px}
.tabs-auth button{flex:1;padding:11px;border:none;background:#FDFCFA;font-weight:600;font-size:14px;color:var(--encre-doux);cursor:pointer;font-family:inherit}
.tabs-auth button.actif{background:var(--teal);color:#fff}

.msg-erreur{background:var(--rouge-soft);color:var(--rouge);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:12px}
.msg-ok{background:var(--vert-soft);color:var(--vert);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:12px}

header.app{background:var(--carte);border-bottom:1px solid var(--ligne);padding:12px 16px 0;position:sticky;top:0;z-index:50}
.header-haut{display:flex;align-items:center;justify-content:space-between;gap:8px}
.header-haut .brand{font-size:21px}
.badge-essai{font-size:11.5px;font-weight:600;background:var(--orange-soft);color:#C2410C;padding:4px 10px;border-radius:99px;white-space:nowrap}
.badge-actif{background:var(--vert-soft);color:var(--vert)}
.header-actions{display:flex;align-items:center;gap:8px}
.lang-switch{display:flex;border:1.5px solid var(--ligne);border-radius:99px;overflow:hidden}
.lang-switch button{border:none;background:transparent;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;color:var(--encre-doux);font-family:inherit}
.lang-switch button.actif{background:var(--teal);color:#fff}
.btn-sortir{border:none;background:transparent;color:var(--encre-doux);font-size:12.5px;font-weight:600;cursor:pointer;padding:6px;font-family:inherit;text-decoration:underline}

nav.ongles{display:flex;gap:2px;margin-top:10px;overflow-x:auto}
nav.ongles button{border:none;background:transparent;padding:10px 14px;font-size:14px;font-weight:600;color:var(--encre-doux);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap}
nav.ongles button.actif{color:var(--teal-deep);border-bottom-color:var(--orange)}

main{padding:16px;max-width:900px;margin:0 auto;padding-bottom:70px}
.section-titre{font-size:19px;margin:18px 0 10px;color:var(--teal-deep)}
.grille-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:var(--carte);border:1px solid var(--ligne);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--ombre)}
.stat .num{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--teal-deep)}
.stat .lbl{font-size:11.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--encre-doux);margin-top:2px}

.item{background:var(--carte);border:1px solid var(--ligne);border-radius:var(--radius);padding:14px 16px;margin-top:10px;box-shadow:var(--ombre)}
.item .ligne1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.item .nom{font-weight:700;font-size:15.5px}
.item .code{font-size:12px;font-weight:700;color:var(--orange);background:var(--orange-soft);padding:2px 9px;border-radius:99px;white-space:nowrap}
.item .detail{font-size:13.5px;color:var(--encre-doux);margin-top:4px}
.item .prix{font-size:13.5px;font-weight:600;margin-top:6px}

.statut{display:inline-block;font-size:12px;font-weight:700;padding:6px 11px;border-radius:99px;margin-top:8px;cursor:pointer}
.st-attente{background:#FEF9C3;color:#A16207}
.st-cousue{background:#D1D5DB;color:#374151}
.st-essayage{background:#C7D2FE;color:#3730A3}
.st-prete{background:var(--orange-soft);color:#C2410C}
.st-livree{background:var(--vert-soft);color:var(--vert)}

.mesure-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.mesure-item{background:#FDFCFA;border:1px solid var(--ligne);border-radius:8px;padding:8px;font-size:12px}
.mesure-item .label{font-weight:600;color:var(--encre-doux)}
.mesure-item .valeur{color:var(--teal-deep);font-weight:700}

.voile{position:fixed;inset:0;background:rgba(28,43,42,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modale{background:var(--carte);border-radius:18px 18px 0 0;padding:20px 18px 30px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modale h3{color:var(--teal-deep);font-size:19px;margin-bottom:4px}
@media(min-width:600px){
  .voile{align-items:center}
  .modale{border-radius:18px}
}

footer.pied{text-align:center;font-size:12px;color:var(--encre-doux);padding:20px 16px 30px}
</style>
</head>
<body>

<div class="tape"></div>

<!-- ============ ÉCRAN AUTH ============ -->
<div id="screenAuth" class="fullpage">
  <div class="brand">Chez Djamil<small>Gestion d'atelier v2</small></div>
  <div class="carte">
    <div class="tabs-auth">
      <button id="tabLogin" class="actif">Connexion</button>
      <button id="tabSignup">Créer mon atelier</button>
    </div>

    <!-- Connexion -->
    <div id="formLogin">
      <label>Email</label>
      <input type="email" id="loginEmail" autocomplete="email" placeholder="vous@exemple.com">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••">
      <button class="btn btn-teal" id="btnLogin">Se connecter</button>
    </div>

    <!-- Inscription -->
    <div id="formSignup" class="hidden">
      <label>Nom de votre atelier</label>
      <input type="text" id="suNom" placeholder="Atelier Fatou Couture">
      <label>Pays</label>
      <select id="suPays">
        <option value="220|GMD">Gambie (+220, Dalasi)</option>
        <option value="221|FCFA">Sénégal (+221, FCFA)</option>
        <option value="225|FCFA">Côte d'Ivoire (+225, FCFA)</option>
        <option value="223|FCFA">Mali (+223, FCFA)</option>
      </select>
      <label>Votre numéro WhatsApp (sans indicatif)</label>
      <input type="tel" id="suTel" inputmode="numeric" placeholder="7XXXXXX">
      <label>Email</label>
      <input type="email" id="suEmail" autocomplete="email" placeholder="vous@exemple.com">
      <label>Mot de passe (6 caractères min.)</label>
      <input type="password" id="suPass" autocomplete="new-password" placeholder="••••••••">
      <button class="btn btn-orange" id="btnSignup">Démarrer mes 14 jours gratuits</button>
    </div>

    <div id="authMsg"></div>
  </div>
</div>

<!-- ============ APP PRINCIPALE ============ -->
<div id="screenApp" class="hidden">
  <header class="app">
    <div class="header-haut">
      <div class="brand" id="brandNom">Chez Djamil</div>
      <div class="header-actions">
        <span class="badge-essai hidden" id="badgePlan"></span>
        <div class="lang-switch">
          <button id="langFR">FR</button>
          <button id="langEN">EN</button>
        </div>
      </div>
    </div>
    <nav class="ongles">
      <button data-vue="apercu" class="actif">Aperçu</button>
      <button data-vue="commandes">Commandes</button>
      <button data-vue="clients">Clients & Mesures</button>
      <button data-vue="rendez">Rendez-vous</button>
      <button data-vue="reglages">Réglages</button>
    </nav>
  </header>

  <main>
    <!-- ---- Aperçu ---- -->
    <div id="vueApercu">
      <div class="grille-stats">
        <div class="stat"><div class="num" id="statCommandes">0</div><div class="lbl">En cours</div></div>
        <div class="stat"><div class="num" id="statPretes">0</div><div class="lbl">Prêtes</div></div>
        <div class="stat"><div class="num" id="statClients">0</div><div class="lbl">Clients</div></div>
        <div class="stat"><div class="num" id="statRdv">0</div><div class="lbl">RDV Proches</div></div>
      </div>
      <h2 class="section-titre">Rappels importants</h2>
      <div id="zoneRappels"></div>
    </div>

    <!-- ---- Commandes ---- -->
    <div id="vueCommandes" class="hidden">
      <button class="btn btn-orange" id="btnNewCmd">+ Nouvelle commande</button>
      <input type="text" id="rechCmd" style="margin-top:12px" placeholder="🔍 Rechercher (nom, code…)">
      <div id="listeCommandes"></div>
    </div>

    <!-- ---- Clients & Mesures ---- -->
    <div id="vueClients" class="hidden">
      <button class="btn btn-teal" id="btnNewClient">+ Nouveau client</button>
      <input type="text" id="rechClient" style="margin-top:12px" placeholder="🔍 Rechercher un client">
      <div id="listeClients"></div>
    </div>

    <!-- ---- Rendez-vous ---- -->
    <div id="vueRendez" class="hidden">
      <button class="btn btn-vert" id="btnNewRdv">+ Nouveau rendez-vous</button>
      <div id="listeRendez"></div>
    </div>

    <!-- ---- Réglages ---- -->
    <div id="vueReglages" class="hidden">
      <div class="carte" style="max-width:none">
        <h3 style="color:var(--teal-deep)">Mon atelier</h3>
        <label>Nom de votre atelier</label>
        <input type="text" id="regNom">
        <label>Numéro WhatsApp manager</label>
        <input type="tel" id="regTelManager" inputmode="numeric">
        <label>Devise</label>
        <input type="text" id="regDevise">
        <button class="btn btn-teal" id="btnSaveReglages">Enregistrer</button>
        <div id="regMsg"></div>
      </div>
      <button class="btn btn-ghost" id="btnLogout" style="max-width:300px;margin:20px auto">Déconnexion</button>
    </div>
  </main>
  <footer class="pied">Chez Djamil · Version 2.0 · chezdjamil.com</footer>
</div>

<!-- ============ MODALE générique ============ -->
<div id="voile" class="voile hidden">
  <div class="modale" id="modaleContenu"></div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBpZi6RN33hlQkMpp8n-XMFPVyYknQtsTg",
  authDomain: "chez-djamil-saas.firebaseapp.com",
  projectId: "chez-djamil-saas",
  storageBucket: "chez-djamil-saas.firebasestorage.app",
  messagingSenderId: "247792907548",
  appId: "1:247792907548:web:c506939ee6d89822c4b6d9"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentLang = localStorage.getItem('lang') || 'fr';

// Statuts de commande
const STATUTS = {
  attente: { label: 'Attente', classe: 'st-attente', emoji: '⏳' },
  cousue: { label: 'Cousue', classe: 'st-cousue', emoji: '🧵' },
  essayage: { label: 'Essayage', classe: 'st-essayage', emoji: '📏' },
  prete: { label: 'Prête', classe: 'st-prete', emoji: '✅' },
  livree: { label: 'Livrée', classe: 'st-livree', emoji: '📦' }
};

// Dictionnaire i18n
const i18n = {
  fr: {
    connexion: "Connexion",
    creerCompte: "Créer mon atelier",
    email: "Email",
    mdp: "Mot de passe",
    seConnecter: "Se connecter",
    demarrerEssai: "Démarrer mes 14 jours gratuits",
  },
  en: {
    connexion: "Login",
    creerCompte: "Create my atelier",
    email: "Email",
    mdp: "Password",
    seConnecter: "Login",
    demarrerEssai: "Start my 14 free days",
  }
};

function t(key) {
  return i18n[currentLang][key] || key;
}

// Auth
auth.onAuthStateChanged(async user => {
  if (!user) {
    document.getElementById('screenAuth').classList.remove('hidden');
    document.getElementById('screenApp').classList.add('hidden');
    return;
  }

  currentUser = user;
  const docUser = await db.collection('ateliers').doc(user.uid).get();
  if (!docUser.exists) {
    await db.collection('ateliers').doc(user.uid).set({ email: user.email, dateCreation: new Date() });
  }

  document.getElementById('screenAuth').classList.add('hidden');
  document.getElementById('screenApp').classList.remove('hidden');
  loadApp(user, docUser.data());
});

// Tabs auth
document.getElementById('tabLogin').addEventListener('click', () => {
  document.getElementById('formLogin').classList.remove('hidden');
  document.getElementById('formSignup').classList.add('hidden');
  document.getElementById('tabLogin').classList.add('actif');
  document.getElementById('tabSignup').classList.remove('actif');
});

document.getElementById('tabSignup').addEventListener('click', () => {
  document.getElementById('formSignup').classList.remove('hidden');
  document.getElementById('formLogin').classList.add('hidden');
  document.getElementById('tabSignup').classList.add('actif');
  document.getElementById('tabLogin').classList.remove('actif');
});

// Login
document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    document.getElementById('authMsg').innerHTML = `<div class="msg-erreur">${e.message}</div>`;
  }
});

// Signup
document.getElementById('btnSignup').addEventListener('click', async () => {
  const nom = document.getElementById('suNom').value;
  const email = document.getElementById('suEmail').value;
  const pass = document.getElementById('suPass').value;
  const pays = document.getElementById('suPays').value;
  const tel = document.getElementById('suTel').value;

  if (!nom || !email || !pass || !tel) {
    document.getElementById('authMsg').innerHTML = '<div class="msg-erreur">Tous les champs sont obligatoires</div>';
    return;
  }

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const [indicatif, devise] = pays.split('|');

    await db.collection('ateliers').doc(cred.user.uid).set({
      nom, email, tel, indicatif, devise,
      plan: 'essai',
      finEssai: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString(),
      dateCreation: new Date().toISOString()
    });
  } catch (e) {
    document.getElementById('authMsg').innerHTML = `<div class="msg-erreur">${e.message}</div>`;
  }
});

// App logic
async function loadApp(user, atelData) {
  const atelier = atelData || {};
  document.getElementById('brandNom').textContent = atelier.nom || 'Chez Djamil';

  if (atelier.plan === 'essai') {
    const finEssai = new Date(atelier.finEssai);
    const jours = Math.ceil((finEssai - new Date()) / (24 * 60 * 60 * 1000));
    document.getElementById('badgePlan').textContent = `Essai gratuit (${jours} j)`;
    document.getElementById('badgePlan').classList.remove('hidden');
  }

  // Changer vues
  document.querySelectorAll('nav.ongles button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav.ongles button').forEach(b => b.classList.remove('actif'));
      btn.classList.add('actif');
      
      const vue = btn.getAttribute('data-vue');
      document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden'));
      document.getElementById('vue' + vue.charAt(0).toUpperCase() + vue.slice(1)).classList.remove('hidden');
      
      if (vue === 'commandes') loadCommandes(user.uid);
      if (vue === 'clients') loadClients(user.uid);
      if (vue === 'rendez') loadRendez(user.uid);
      if (vue === 'apercu') loadApercu(user.uid);
    });
  });

  // Réglages
  document.getElementById('regNom').value = atelier.nom || '';
  document.getElementById('regTelManager').value = atelier.telManager || '';
  document.getElementById('regDevise').value = atelier.devise || '';

  document.getElementById('btnSaveReglages').addEventListener('click', async () => {
    await db.collection('ateliers').doc(user.uid).update({
      nom: document.getElementById('regNom').value,
      telManager: document.getElementById('regTelManager').value,
      devise: document.getElementById('regDevise').value
    });
    document.getElementById('regMsg').innerHTML = '<div class="msg-ok">Paramètres enregistrés ✓</div>';
    setTimeout(() => { document.getElementById('regMsg').innerHTML = ''; }, 2000);
  });

  document.getElementById('btnLogout').addEventListener('click', () => auth.signOut());

  // Boutons nouveaux
  document.getElementById('btnNewCmd').addEventListener('click', () => showModalNewCmd(user.uid));
  document.getElementById('btnNewClient').addEventListener('click', () => showModalNewClient(user.uid));
  document.getElementById('btnNewRdv').addEventListener('click', () => showModalNewRdv(user.uid));

  // Chargement initial
  await loadApercu(user.uid);
}

async function loadApercu(userId) {
  const cmds = await db.collection('ateliers').doc(userId).collection('commandes').get();
  let enCours = 0, pretes = 0, clients = new Set();
  
  cmds.forEach(doc => {
    const cmd = doc.data();
    if (cmd.statut !== 'livree') enCours++;
    if (cmd.statut === 'prete') pretes++;
    if (cmd.client) clients.add(cmd.client);
  });

  // Rendez-vous proches
  const rdvs = await db.collection('ateliers').doc(userId).collection('rendez-vous').get();
  let rdvProches = 0;
  const now = new Date();
  rdvs.forEach(doc => {
    const rdv = doc.data();
    if (rdv.date) {
      const rdvDate = new Date(rdv.date);
      if (rdvDate > now && rdvDate < new Date(now.getTime() + 24 * 60 * 60 * 1000)) {
        rdvProches++;
      }
    }
  });

  document.getElementById('statCommandes').textContent = enCours;
  document.getElementById('statPretes').textContent = pretes;
  document.getElementById('statClients').textContent = clients.size;
  document.getElementById('statRdv').textContent = rdvProches;

  // Afficher les rappels
  const zoneRappels = document.getElementById('zoneRappels');
  zoneRappels.innerHTML = '';
  
  if (rdvProches > 0) {
    const alert = document.createElement('div');
    alert.className = 'item';
    alert.innerHTML = `<strong>⚠️ ${rdvProches} rendez-vous dans les 24h!</strong>`;
    zoneRappels.appendChild(alert);
  }

  if (pretes > 0) {
    const alert = document.createElement('div');
    alert.className = 'item';
    alert.innerHTML = `<strong>✅ ${pretes} commandes prêtes à livrer!</strong>`;
    zoneRappels.appendChild(alert);
  }
}

async function loadCommandes(userId) {
  const cmds = await db.collection('ateliers').doc(userId).collection('commandes').get();
  const liste = document.getElementById('listeCommandes');
  liste.innerHTML = '';

  cmds.forEach(doc => {
    const cmd = doc.data();
    const item = document.createElement('div');
    item.className = 'item';
    
    const statut = STATUTS[cmd.statut] || STATUTS.attente;
    
    item.innerHTML = `
      <div class="ligne1">
        <div>
          <div class="nom">${cmd.client || 'Sans nom'}</div>
          <div class="detail">Commande créée: ${new Date(cmd.dateCreation).toLocaleDateString('fr-FR')}</div>
        </div>
      </div>
      <div class="detail"><strong>Description:</strong> ${cmd.description || 'Aucune description'}</div>
      <div class="detail"><strong>Prix:</strong> ${cmd.prix || '0'} ${cmd.devise || 'FCFA'}</div>
      <div class="statut ${statut.classe}" onclick="changeStatut('${doc.id}', '${userId}')">${statut.emoji} ${statut.label}</div>
    `;
    liste.appendChild(item);
  });
}

async function loadClients(userId) {
  const clients = await db.collection('ateliers').doc(userId).collection('clients').get();
  const liste = document.getElementById('listeClients');
  liste.innerHTML = '';

  clients.forEach(doc => {
    const client = doc.data();
    const item = document.createElement('div');
    item.className = 'item';
    
    let mesuresHtml = '';
    if (client.mesures) {
      mesuresHtml = `
        <div class="mesure-grid">
          <div class="mesure-item"><div class="label">Taille</div><div class="valeur">${client.mesures.taille || '-'}</div></div>
          <div class="mesure-item"><div class="label">Tour de poitrine</div><div class="valeur">${client.mesures.poitrine || '-'}</div></div>
          <div class="mesure-item"><div class="label">Taille (ceinture)</div><div class="valeur">${client.mesures.tailleC || '-'}</div></div>
          <div class="mesure-item"><div class="label">Longueur</div><div class="valeur">${client.mesures.longueur || '-'}</div></div>
        </div>
      `;
    }
    
    item.innerHTML = `
      <div class="ligne1">
        <div class="nom">${client.nom || 'Sans nom'}</div>
      </div>
      <div class="detail">Tel: ${client.tel || '-'} | Email: ${client.email || '-'}</div>
      ${mesuresHtml}
    `;
    liste.appendChild(item);
  });
}

async function loadRendez(userId) {
  const rdvs = await db.collection('ateliers').doc(userId).collection('rendez-vous').get();
  const liste = document.getElementById('listeRendez');
  liste.innerHTML = '';

  rdvs.forEach(doc => {
    const rdv = doc.data();
    const item = document.createElement('div');
    item.className = 'item';
    
    const rdvDate = rdv.date ? new Date(rdv.date).toLocaleString('fr-FR') : 'Date non définie';
    
    item.innerHTML = `
      <div class="ligne1">
        <div class="nom">${rdv.client || 'Sans nom'}</div>
      </div>
      <div class="detail"><strong>📅 ${rdvDate}</strong></div>
      <div class="detail">📝 ${rdv.motif || 'Aucun motif'}</div>
    `;
    liste.appendChild(item);
  });
}

async function changeStatut(cmdId, userId) {
  const statuts = ['attente', 'cousue', 'essayage', 'prete', 'livree'];
  const cmdDoc = await db.collection('ateliers').doc(userId).collection('commandes').doc(cmdId).get();
  const cmd = cmdDoc.data();
  
  const currentIdx = statuts.indexOf(cmd.statut);
  const newStatut = statuts[(currentIdx + 1) % statuts.length];
  
  await db.collection('ateliers').doc(userId).collection('commandes').doc(cmdId).update({ statut: newStatut });
  
  // Notification WhatsApp
  console.log('✅ Notification WhatsApp - Statut changé en:', STATUTS[newStatut].label);
  
  await loadCommandes(userId);
}
